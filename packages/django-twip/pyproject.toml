[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "django-twip"
version = "0.1.0"
description = "Django integration for the Twip Tailwind web component library."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "Twip" }]
dependencies = ["Django>=4.2"]
classifiers = [
    "Framework :: Django",
    "Framework :: Django :: 4.2",
    "Framework :: Django :: 5.0",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
]

[project.urls]
Homepage = "https://github.com/twip/components"
Issues = "https://github.com/twip/components/issues"

[tool.setuptools]
include-package-data = true

[tool.setuptools.packages.find]
include = ["twip*"]

[tool.setuptools.package-data]
twip = ["static/twip/**/*", "templates/twip/**/*"]
